name: prd-lab

services:
  mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: prd-lab-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: prdlab_root
      MYSQL_DATABASE: prdlab
      MYSQL_USER: prdlab
      MYSQL_PASSWORD: prdlab
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
      - --explicit_defaults_for_timestamp=ON
      - --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "prdlab", "-pprdlab"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: prd-lab-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  main:
    image: prd-lab-app:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: prd-lab-main
    restart: unless-stopped
    env_file:
      - ../.env
    command: pnpm --filter @prd-lab/main start
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

  preview:
    image: prd-lab-app:latest
    container_name: prd-lab-preview
    restart: unless-stopped
    env_file:
      - ../.env
    command: pnpm --filter @prd-lab/preview start
    expose:
      - "3001"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: prd-lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"      # 主站
      - "8081:8081"  # 预览站（避让 8080 = finance-ingest 占用）
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main
      - preview

volumes:
  mysql_data:
  minio_data:
