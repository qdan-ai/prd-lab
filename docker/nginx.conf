user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # 宿主机上跑的 Next.js dev 服务器
  upstream main_app {
    server host.docker.internal:3000;
  }
  upstream preview_app {
    server host.docker.internal:3001;
  }

  # ---- 主站：app.local ----
  server {
    listen 80;
    server_name app.local;

    location / {
      proxy_pass http://main_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Next.js dev HMR via WebSocket
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
    }
  }

  # ---- 预览站：preview.local（双域名隔离的关键）----
  server {
    listen 80;
    server_name preview.local;

    location / {
      proxy_pass http://preview_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
    }
  }

  # ---- 兜底：直接访问 IP / localhost 时给 hosts 提示 ----
  server {
    listen 80 default_server;
    server_name _;
    return 200 "PRD-Lab nginx is up.\nPlease access via http://app.local or http://preview.local\n(add them to /etc/hosts pointing to 127.0.0.1)\n";
    default_type text/plain;
  }
}
